<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Inventory System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-charcoal: #2a2a2a;
      --color-slate: #3d4451;
      --color-fog: #e8eaed;
      --color-cream: #f5f3ef;
      --color-copper: #b87333;
      --color-rust: #a0522d;
      --color-sage: #8a9a5b;
      --color-shadow: rgba(42, 42, 42, 0.15);
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --border-radius: 2px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Work Sans', -apple-system, sans-serif;
      font-weight: 300;
      color: var(--color-charcoal);
      background: linear-gradient(135deg, var(--color-cream) 0%, var(--color-fog) 100%);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Header */
    header {
      background: var(--color-charcoal);
      color: var(--color-cream);
      padding: var(--spacing-lg) var(--spacing-xl);
      box-shadow: 0 4px 20px var(--color-shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      margin-bottom: var(--spacing-xs);
      background: linear-gradient(135deg, var(--color-cream) 0%, var(--color-copper) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-weight: 300;
      font-size: 0.95rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Navigation */
    nav {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: var(--spacing-md);
    }

    nav button {
      background: transparent;
      border: 1px solid var(--color-copper);
      color: var(--color-cream);
      padding: var(--spacing-xs) var(--spacing-md);
      cursor: pointer;
      font-family: 'Work Sans', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    nav button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--color-copper);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    nav button:hover::before,
    nav button.active::before {
      left: 0;
    }

    nav button:hover,
    nav button.active {
      border-color: var(--color-copper);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(184, 115, 51, 0.3);
    }

    /* Main Container */
    main {
      max-width: 1400px;
      margin: var(--spacing-xl) auto;
      padding: 0 var(--spacing-xl);
    }

    /* Stats Dashboard */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    .stat-card {
      background: white;
      padding: var(--spacing-lg);
      box-shadow: 0 2px 8px var(--color-shadow);
      border-left: 4px solid var(--color-copper);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--color-shadow);
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-copper);
      line-height: 1;
      margin-bottom: var(--spacing-xs);
    }

    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-slate);
      font-weight: 500;
    }

    /* Form Styles */
    .form-section {
      background: white;
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-xl);
      box-shadow: 0 4px 16px var(--color-shadow);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--spacing-md);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-slate);
    }

    input, select, textarea {
      padding: var(--spacing-sm);
      border: 2px solid var(--color-fog);
      background: var(--color-cream);
      font-family: 'Work Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--color-copper);
      background: white;
      box-shadow: 0 0 0 3px rgba(184, 115, 51, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Work Sans', sans-serif;
    }

    button[type="submit"], .btn-primary {
      background: var(--color-copper);
      color: white;
      padding: var(--spacing-sm) var(--spacing-xl);
      border: none;
      cursor: pointer;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(184, 115, 51, 0.3);
      margin-top: var(--spacing-md);
    }

    button[type="submit"]:hover, .btn-primary:hover {
      background: var(--color-rust);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(184, 115, 51, 0.4);
    }

    button[type="submit"]:active, .btn-primary:active {
      transform: translateY(0);
    }

    /* Filter Bar */
    .filter-bar {
      background: white;
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      align-items: center;
      box-shadow: 0 2px 8px var(--color-shadow);
    }

    .filter-bar input,
    .filter-bar select {
      flex: 1;
      min-width: 200px;
      margin: 0;
    }

    /* Inventory Grid */
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--spacing-md);
    }

    .item-card {
      background: white;
      padding: var(--spacing-lg);
      box-shadow: 0 2px 8px var(--color-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .item-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--color-copper);
      transform: scaleY(0);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px var(--color-shadow);
    }

    .item-card:hover::before {
      transform: scaleY(1);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-sm);
    }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-charcoal);
      line-height: 1.2;
    }

    .item-brand {
      font-size: 0.9rem;
      color: var(--color-copper);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--spacing-xs);
    }

    .item-details {
      display: grid;
      gap: var(--spacing-xs);
      margin: var(--spacing-md) 0;
      font-size: 0.9rem;
    }

    .item-detail {
      display: flex;
      justify-content: space-between;
      padding: var(--spacing-xs) 0;
      border-bottom: 1px solid var(--color-fog);
    }

    .item-detail-label {
      font-weight: 500;
      color: var(--color-slate);
    }

    .item-detail-value {
      font-weight: 400;
      color: var(--color-charcoal);
      text-align: right;
    }

    .item-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-sage);
      margin-top: var(--spacing-sm);
    }

    .item-actions {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-fog);
    }

    .btn-edit, .btn-delete {
      flex: 1;
      padding: var(--spacing-xs) var(--spacing-sm);
      border: none;
      cursor: pointer;
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s;
    }

    .btn-edit {
      background: var(--color-sage);
      color: white;
    }

    .btn-delete {
      background: var(--color-rust);
      color: white;
    }

    .btn-edit:hover {
      background: #6e7d42;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(138, 154, 91, 0.3);
    }

    .btn-delete:hover {
      background: #8b4513;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(160, 82, 45, 0.3);
    }

    /* Utility Classes */
    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: var(--spacing-xl);
      font-size: 1.2rem;
      color: var(--color-slate);
    }

    .empty-state {
      text-align: center;
      padding: var(--spacing-xl);
      background: white;
      box-shadow: 0 2px 8px var(--color-shadow);
    }

    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--color-slate);
      margin-bottom: var(--spacing-sm);
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      main {
        padding: 0 var(--spacing-md);
        margin: var(--spacing-md) auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .inventory-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item-card {
      animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .item-card:nth-child(1) { animation-delay: 0.05s; }
    .item-card:nth-child(2) { animation-delay: 0.1s; }
    .item-card:nth-child(3) { animation-delay: 0.15s; }
    .item-card:nth-child(4) { animation-delay: 0.2s; }
    .item-card:nth-child(5) { animation-delay: 0.25s; }
    .item-card:nth-child(6) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <header>
    <h1>Home Inventory</h1>
    <p class="subtitle">Personal Asset Management System</p>
    <nav>
      <button id="viewInventoryBtn" class="active">View Inventory</button>
      <button id="addItemBtn">Add New Item</button>
      <button id="statisticsBtn">Statistics</button>
      <button id="exportBtn">Export Data</button>
    </nav>
  </header>

  <main>
    <!-- Statistics Section -->
    <section id="statisticsSection" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalItems">0</div>
          <div class="stat-label">Total Items</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalValue">$0</div>
          <div class="stat-label">Total Value</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="itemsWithWarranty">0</div>
          <div class="stat-label">Items with Warranty</div>
        </div>
      </div>
    </section>

    <!-- Add Item Form -->
    <section id="formSection" class="form-section hidden">
      <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: var(--spacing-lg);">
        <span id="formTitle">Add New Item</span>
      </h2>
      <form id="itemForm">
        <input type="hidden" id="itemId" name="id">
        
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Item Name *</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="brand">Brand</label>
            <input type="text" id="brand" name="brand">
          </div>

          <div class="form-group">
            <label for="model">Model Number</label>
            <input type="text" id="model" name="model">
          </div>

          <div class="form-group">
            <label for="serialNumber">Serial Number</label>
            <input type="text" id="serialNumber" name="serialNumber">
          </div>

          <div class="form-group">
            <label for="gtin">UPC/Barcode</label>
            <input type="text" id="gtin" name="gtin">
          </div>

          <div class="form-group">
            <label for="classification">Classification</label>
            <input type="text" id="classification" name="classification" 
                   placeholder="e.g., Photography, Computer, Tools">
          </div>

          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="ownershipInfo.location" 
                   placeholder="e.g., Office, Garage">
          </div>

          <div class="form-group">
            <label for="owner">Owner</label>
            <input type="text" id="owner" name="ownershipInfo.owner">
          </div>

          <div class="form-group">
            <label for="acquiredDate">Acquired Date</label>
            <input type="date" id="acquiredDate" name="ownershipInfo.acquiredDate">
          </div>

          <div class="form-group">
            <label for="price">Purchase Price</label>
            <input type="number" id="price" name="offers.price" step="0.01" min="0">
          </div>

          <div class="form-group">
            <label for="currentValue">Current Value</label>
            <input type="number" id="currentValue" name="currentValue" step="0.01" min="0">
          </div>

          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="ownershipInfo.quantity" min="1" value="1">
          </div>

          <div class="form-group">
            <label for="condition">Condition</label>
            <select id="condition" name="ownershipInfo.condition">
              <option value="">Select condition</option>
              <option value="New">New</option>
              <option value="Excellent">Excellent</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
              <option value="Poor">Poor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="warrantyPeriod">Warranty (months)</label>
            <input type="number" id="warrantyPeriod" name="warrantyInfo.durationOfWarranty.value" min="0">
          </div>
        </div>

        <div class="form-group" style="margin-top: var(--spacing-md);">
          <label for="description">Description / Notes</label>
          <textarea id="description" name="description"></textarea>
        </div>

        <button type="submit" class="btn-primary">Save Item</button>
        <button type="button" id="cancelBtn" class="btn-primary" 
                style="background: var(--color-slate); margin-left: var(--spacing-sm);">
          Cancel
        </button>
      </form>
    </section>

    <!-- Inventory List -->
    <section id="inventorySection">
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search items...">
        <select id="locationFilter">
          <option value="">All Locations</option>
        </select>
        <select id="classificationFilter">
          <option value="">All Classifications</option>
        </select>
      </div>

      <div id="inventoryGrid" class="inventory-grid">
        <div class="loading">Loading inventory...</div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = '/api';
    let currentFilter = {};

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadInventory();
      loadFilterOptions();
      setupEventListeners();
    });

    // Event Listeners
    function setupEventListeners() {
      document.getElementById('viewInventoryBtn').addEventListener('click', showInventory);
      document.getElementById('addItemBtn').addEventListener('click', showAddForm);
      document.getElementById('statisticsBtn').addEventListener('click', showStatistics);
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('itemForm').addEventListener('submit', handleFormSubmit);
      document.getElementById('cancelBtn').addEventListener('click', showInventory);
      document.getElementById('searchInput').addEventListener('input', debounce(handleSearch, 300));
      document.getElementById('locationFilter').addEventListener('change', handleFilterChange);
      document.getElementById('classificationFilter').addEventListener('change', handleFilterChange);
    }

    // Navigation
    function showInventory() {
      setActiveNav('viewInventoryBtn');
      document.getElementById('inventorySection').classList.remove('hidden');
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('statisticsSection').classList.add('hidden');
      loadInventory();
    }

    function showAddForm() {
      setActiveNav('addItemBtn');
      document.getElementById('inventorySection').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
      document.getElementById('statisticsSection').classList.add('hidden');
      document.getElementById('itemForm').reset();
      document.getElementById('itemId').value = '';
      document.getElementById('formTitle').textContent = 'Add New Item';
    }

    function showStatistics() {
      setActiveNav('statisticsBtn');
      document.getElementById('inventorySection').classList.add('hidden');
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('statisticsSection').classList.remove('hidden');
      loadStatistics();
    }

    function setActiveNav(buttonId) {
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(buttonId).classList.add('active');
    }

    // API Calls
    async function loadInventory() {
      try {
        const params = new URLSearchParams(currentFilter);
        const response = await fetch(`${API_BASE}/items?${params}`);
        const data = await response.json();
        
        renderInventory(data.data || []);
      } catch (error) {
        console.error('Error loading inventory:', error);
        document.getElementById('inventoryGrid').innerHTML = 
          '<div class="empty-state"><h2>Error loading inventory</h2></div>';
      }
    }

    async function loadFilterOptions() {
      try {
        const [locations, classifications] = await Promise.all([
          fetch(`${API_BASE}/filters/ownershipInfo.location`).then(r => r.json()),
          fetch(`${API_BASE}/filters/classification`).then(r => r.json())
        ]);

        populateSelect('locationFilter', locations.data || []);
        populateSelect('classificationFilter', classifications.data || []);
      } catch (error) {
        console.error('Error loading filter options:', error);
      }
    }

    function populateSelect(selectId, options) {
      const select = document.getElementById(selectId);
      const currentOptions = Array.from(select.options).slice(1).map(o => o.value);
      
      options.forEach(option => {
        if (!currentOptions.includes(option)) {
          const opt = document.createElement('option');
          opt.value = option;
          opt.textContent = option;
          select.appendChild(opt);
        }
      });
    }

    async function loadStatistics() {
      try {
        const response = await fetch(`${API_BASE}/statistics`);
        const data = await response.json();
        
        const stats = data.data;
        document.getElementById('totalItems').textContent = stats.totalItems;
        document.getElementById('totalValue').textContent = 
          new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' })
            .format(stats.totalValue);
        document.getElementById('itemsWithWarranty').textContent = stats.itemsWithWarranty;
      } catch (error) {
        console.error('Error loading statistics:', error);
      }
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const itemData = {};
      
      // Build nested object structure
      formData.forEach((value, key) => {
        if (value && key !== 'id') {
          const keys = key.split('.');
          let current = itemData;
          
          for (let i = 0; i < keys.length - 1; i++) {
            if (!current[keys[i]]) current[keys[i]] = {};
            current = current[keys[i]];
          }
          
          const lastKey = keys[keys.length - 1];
          current[lastKey] = isNaN(value) ? value : parseFloat(value);
        }
      });

      try {
        const itemId = document.getElementById('itemId').value;
        const url = itemId ? `${API_BASE}/items/${itemId}` : `${API_BASE}/items`;
        const method = itemId ? 'PUT' : 'POST';

        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(itemData)
        });

        if (response.ok) {
          showInventory();
        } else {
          alert('Error saving item');
        }
      } catch (error) {
        console.error('Error saving item:', error);
        alert('Error saving item');
      }
    }

    async function deleteItem(id) {
      if (!confirm('Are you sure you want to delete this item?')) return;

      try {
        const response = await fetch(`${API_BASE}/items/${id}`, { method: 'DELETE' });
        if (response.ok) {
          loadInventory();
        }
      } catch (error) {
        console.error('Error deleting item:', error);
      }
    }

    async function editItem(id) {
      try {
        const response = await fetch(`${API_BASE}/items/${id}`);
        const data = await response.json();
        const item = data.data;

        document.getElementById('itemId').value = item.id;
        document.getElementById('name').value = item.name || '';
        document.getElementById('brand').value = item.brand || '';
        document.getElementById('model').value = item.model || '';
        document.getElementById('serialNumber').value = item.serialNumber || '';
        document.getElementById('gtin').value = item.gtin || '';
        document.getElementById('classification').value = item.classification || '';
        document.getElementById('location').value = item.ownershipInfo?.location || '';
        document.getElementById('owner').value = item.ownershipInfo?.owner || '';
        document.getElementById('acquiredDate').value = item.ownershipInfo?.acquiredDate || '';
        document.getElementById('price').value = item.offers?.price || '';
        document.getElementById('currentValue').value = item.currentValue || '';
        document.getElementById('quantity').value = item.ownershipInfo?.quantity || 1;
        document.getElementById('condition').value = item.ownershipInfo?.condition || '';
        document.getElementById('warrantyPeriod').value = item.warrantyInfo?.durationOfWarranty?.value || '';
        document.getElementById('description').value = item.description || '';

        document.getElementById('formTitle').textContent = 'Edit Item';
        showAddForm();
      } catch (error) {
        console.error('Error loading item:', error);
      }
    }

    async function exportData() {
      try {
        const response = await fetch(`${API_BASE}/export`);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `inventory-export-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
      } catch (error) {
        console.error('Error exporting data:', error);
        alert('Error exporting data');
      }
    }

    // Rendering
    function renderInventory(items) {
      const grid = document.getElementById('inventoryGrid');
      
      if (items.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h2>No items found</h2><p>Add your first item to get started</p></div>';
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="item-card">
          <div class="item-header">
            <div>
              ${item.brand ? `<div class="item-brand">${item.brand}</div>` : ''}
              <div class="item-name">${item.name}</div>
            </div>
          </div>
          
          <div class="item-details">
            ${item.model ? `
              <div class="item-detail">
                <span class="item-detail-label">Model</span>
                <span class="item-detail-value">${item.model}</span>
              </div>
            ` : ''}
            ${item.ownershipInfo?.location ? `
              <div class="item-detail">
                <span class="item-detail-label">Location</span>
                <span class="item-detail-value">${item.ownershipInfo.location}</span>
              </div>
            ` : ''}
            ${item.classification ? `
              <div class="item-detail">
                <span class="item-detail-label">Category</span>
                <span class="item-detail-value">${item.classification}</span>
              </div>
            ` : ''}
            ${item.ownershipInfo?.condition ? `
              <div class="item-detail">
                <span class="item-detail-label">Condition</span>
                <span class="item-detail-value">${item.ownershipInfo.condition}</span>
              </div>
            ` : ''}
          </div>

          ${item.currentValue ? `
            <div class="item-value">
              ${new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' })
                .format(item.currentValue)}
            </div>
          ` : ''}

          <div class="item-actions">
            <button class="btn-edit" onclick="editItem('${item.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    // Filters
    function handleSearch(e) {
      currentFilter.search = e.target.value;
      loadInventory();
    }

    function handleFilterChange() {
      currentFilter.location = document.getElementById('locationFilter').value;
      currentFilter.classification = document.getElementById('classificationFilter').value;
      loadInventory();
    }

    // Utilities
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  </script>
</body>
</html>
